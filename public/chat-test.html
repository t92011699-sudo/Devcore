<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💬 نظام الشات - المريض والدكتور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #e8edf3;
            border-bottom: 2px solid #d0d7e2;
        }

        .tabs button {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tabs button.active {
            background: white;
            border-bottom-color: #2c6b9e;
            color: #2c6b9e;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== PATIENT ===== */
        .patient-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .patient-header {
            background: #2c6b9e;
            color: white;
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .patient-header .status {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 14px;
            border-radius: 20px;
        }

        .patient-messages {
            height: 380px;
            overflow-y: auto;
            background: #fafbfc;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e0e4e8;
            margin-bottom: 12px;
        }

        .message {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }

        .message-left {
            background: #cce5ff;
            margin-right: auto;
            border-bottom-right-radius: 4px;
            text-align: right;
        }

        .message-right {
            background: #d4edda;
            margin-left: auto;
            border-bottom-left-radius: 4px;
            text-align: right;
        }

        .message-system {
            background: #e8f5e9;
            margin-left: auto;
            border-bottom-left-radius: 4px;
            text-align: right;
            font-style: italic;
            color: #2e7d32;
        }

        .message .sender {
            font-size: 11px;
            font-weight: bold;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
        }

        .message .delete-btn {
            position: absolute;
            top: 4px;
            left: 4px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            line-height: 20px;
            text-align: center;
        }

        .message:hover .delete-btn {
            display: block;
        }

        .patient-input {
            display: flex;
            gap: 10px;
        }

        .patient-input input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e4e8;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .patient-input input:focus {
            border-color: #2c6b9e;
        }

        .patient-input button {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            background: #2c6b9e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .patient-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-hint {
            font-size: 13px;
            color: #888;
            min-height: 24px;
            padding: 4px 0;
            font-style: italic;
        }

        .form-container {
            padding: 16px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }

        .form-container input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 2px solid #e0e4e8;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        .form-container input:focus {
            border-color: #2c6b9e;
        }

        .form-container button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #28a745;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .form-container button:hover {
            background: #1e7e34;
        }

        .hidden {
            display: none !important;
        }

        .room-info {
            padding: 12px 16px;
            background: #e8edf3;
            border-radius: 12px;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .room-info .room-id {
            font-weight: bold;
            color: #2c6b9e;
            font-size: 12px;
        }

        .chat-footer {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
            color: #999;
        }

        /* ===== DOCTOR ===== */
        .doctor-dashboard {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .doctor-sidebar {
            flex: 0 0 320px;
            background: #f8f9fc;
            border-radius: 16px;
            padding: 16px;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e4e8;
        }

        .doctor-sidebar h3 {
            margin-bottom: 12px;
            font-size: 16px;
            color: #333;
        }

        .room-item {
            padding: 12px;
            border-radius: 12px;
            background: white;
            margin-bottom: 8px;
            border: 1px solid #e8edf3;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .room-item:hover {
            border-color: #2c6b9e;
        }

        .room-item.active {
            border-color: #2c6b9e;
            background: #eaf2fa;
        }

        .room-item .name {
            font-weight: bold;
            font-size: 15px;
        }

        .room-item .phone {
            font-size: 13px;
            color: #666;
        }

        .room-item .guest {
            color: #ff8c00;
            font-size: 12px;
        }

        .room-item .unread {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 0 8px;
            font-size: 11px;
            margin-right: 6px;
        }

        .room-item .last-msg {
            font-size: 13px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-item .time {
            font-size: 11px;
            color: #999;
        }

        .room-item .delete-room-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            display: none;
            line-height: 24px;
            text-align: center;
        }

        .room-item:hover .delete-room-btn {
            display: block;
        }

        .doctor-chat-area {
            flex: 1;
            min-width: 300px;
            border: 1px solid #e0e4e8;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 600px;
        }

        .doctor-chat-header {
            background: #2c6b9e;
            color: white;
            padding: 14px 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .doctor-chat-header small {
            font-weight: normal;
            font-size: 14px;
            opacity: 0.8;
        }

        .doctor-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafbfc;
            min-height: 300px;
            max-height: 400px;
        }

        .doctor-messages .message .delete-btn {
            display: block;
        }

        .doctor-input-area {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
            border-top: 1px solid #e0e4e8;
            background: white;
        }

        .doctor-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        .doctor-input-area button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #2c6b9e;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .doctor-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-room-selected {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        .refresh-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #2c6b9e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .refresh-btn:hover {
            background: #1a4f7a;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="tabs">
            <button class="active" onclick="switchTab('patient')">🧑‍⚕️ شات المريض</button>
            <button onclick="switchTab('doctor')">👨‍⚕️ Dashboard الدكتور</button>
        </div>

        <!-- ===================== PATIENT TAB ===================== -->
        <div id="tab-patient" class="tab-content active">
            <div class="patient-container">
                <div class="patient-header">
                    <span>💬 الشات</span>
                    <span class="status" id="patientStatus">⏳ جاري الاتصال...</span>
                </div>

                <div class="form-container" id="formContainer">
                    <input type="text" id="patientName" placeholder="👤 الاسم الكامل" value="يوسف">
                    <input type="text" id="patientPhone" placeholder="📱 رقم التليفون" value="01011150572">
                    <button onclick="createRoom()">🚀 بدء المحادثة</button>
                </div>

                <div class="room-info hidden" id="roomInfo">
                    <span>📌 الغرفة: <span class="room-id" id="roomIdDisplay">-</span></span>
                    <span>👤 <span id="patientNameDisplay">-</span></span>
                </div>

                <div class="patient-messages" id="patientMessages">
                    <div style="text-align:center;color:#999;padding:40px 0;font-size:14px;">
                        📌 أدخل اسمك ورقمك ثم اضغط "بدء المحادثة"
                    </div>
                </div>

                <div class="typing-hint" id="typingHint"></div>

                <div class="patient-input hidden" id="patientInput">
                    <input type="text" id="patientMsgInput" placeholder="اكتب رسالتك..."
                        onkeypress="if(event.key==='Enter') sendPatientMessage()">
                    <button id="patientSendBtn" onclick="sendPatientMessage()" disabled>📤 إرسال</button>
                </div>

                <div class="chat-footer">
                    <span id="patientConnectionStatus">🔴 غير متصل</span>
                    <span id="patientMsgCount">0 رسائل</span>
                </div>
            </div>
        </div>

        <!-- ===================== DOCTOR TAB ===================== -->
        <div id="tab-doctor" class="tab-content">
            <div class="doctor-dashboard">
                <div class="doctor-sidebar">
                    <h3>📋 قائمة المحادثات</h3>
                    <div id="roomsList">
                        <div style="color:#999;text-align:center;padding:20px;">جاري تحميل المحادثات...</div>
                    </div>
                    <button class="refresh-btn" onclick="refreshRooms()">🔄 تحديث</button>
                </div>
                <div class="doctor-chat-area">
                    <div class="doctor-chat-header" id="doctorChatHeader">
                        💬 المحادثة
                        <small id="doctorRoomName">اختر محادثة من القائمة</small>
                    </div>
                    <div class="doctor-messages" id="doctorMessages">
                        <div class="no-room-selected">👈 اختر محادثة من القائمة لعرض الرسائل</div>
                    </div>
                    <div class="doctor-input-area">
                        <input type="text" id="doctorMsgInput" placeholder="اكتب ردك..."
                            onkeypress="if(event.key==='Enter') sendDoctorMessage()" disabled>
                        <button id="doctorSendBtn" onclick="sendDoctorMessage()" disabled>📤 إرسال</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔧 الإعدادات
        // ============================================================
        const API_BASE = 'https://devcore-fawn.vercel.app';
        const DOCTOR_ID = '5b075375-0b21-4e67-91c8-1ab2c709fa85';

        // ============================================================
        // 📌 PATIENT SIDE
        // ============================================================
        let currentRoomId = '';
        let patientName = '';
        let patientPhone = '';
        let patientPolling = null;
        let patientMsgCount = 0;

        const patientMessagesDiv = document.getElementById('patientMessages');
        const patientMsgInput = document.getElementById('patientMsgInput');
        const patientSendBtn = document.getElementById('patientSendBtn');
        const patientStatus = document.getElementById('patientStatus');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const patientNameDisplay = document.getElementById('patientNameDisplay');
        const roomInfo = document.getElementById('roomInfo');
        const formContainer = document.getElementById('formContainer');
        const patientInput = document.getElementById('patientInput');
        const patientConnectionStatus = document.getElementById('patientConnectionStatus');
        const patientMsgCountEl = document.getElementById('patientMsgCount');
        const typingHint = document.getElementById('typingHint');

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function addPatientMessage(senderType, message, alignment, msgId) {
            const div = document.createElement('div');
            const cls = alignment === 'left' ? 'message-left' : alignment === 'right' ? 'message-right' : 'message-system';
            div.className = `message ${cls}`;
            div.dataset.msgId = msgId || '';
            const senderName = senderType === 'patient' ? '🧑‍⚕️ مريض' :
                senderType === 'system' ? '🤖 النظام' : '👨‍⚕️ دكتور';
            div.innerHTML = `
                <div class="sender">${senderName}</div>
                <div>${message}</div>
                <div class="time">${new Date().toLocaleTimeString()}</div>
                ${msgId ? `<button class="delete-btn" onclick="deleteMessage('${msgId}')">✕</button>` : ''}
            `;
            patientMessagesDiv.appendChild(div);
            patientMessagesDiv.scrollTop = patientMessagesDiv.scrollHeight;
            patientMsgCount++;
            patientMsgCountEl.textContent = `${patientMsgCount} رسائل`;
        }

        function setPatientStatus(connected) {
            patientStatus.textContent = connected ? '✅ متصل' : '❌ غير متصل';
            patientConnectionStatus.textContent = connected ? '🟢 متصل' : '🔴 غير متصل';
            patientSendBtn.disabled = !connected || !currentRoomId;
        }

        function showPatientRoomInfo(roomId, name) {
            roomInfo.classList.remove('hidden');
            roomIdDisplay.textContent = roomId;
            patientNameDisplay.textContent = name;
        }

        function showPatientInput(show) {
            if (show) {
                patientInput.classList.remove('hidden');
                patientSendBtn.disabled = false;
            } else {
                patientInput.classList.add('hidden');
                patientSendBtn.disabled = true;
            }
        }

        async function createRoom() {
            const name = document.getElementById('patientName').value.trim();
            const phone = document.getElementById('patientPhone').value.trim();
            if (!name || !phone) { alert('⚠️ يرجى إدخال الاسم ورقم التليفون'); return; }
            patientName = name;
            patientPhone = phone;
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doctor_id: DOCTOR_ID, patient_name: name, patient_phone: phone })
                });
                const data = await res.json();
                if (data.success) {
                    currentRoomId = data.room.id;
                    formContainer.classList.add('hidden');
                    showPatientRoomInfo(currentRoomId, patientName);
                    showPatientInput(true);
                    setPatientStatus(true);
                    if (data.autoMessage) {
                        // الرسالة الترحيبية من الـ system
                        addPatientMessage('system', data.autoMessage, 'right');
                    }
                    startPatientPolling();
                    patientMsgCountEl.textContent = '0 رسائل';
                } else {
                    alert('❌ فشل إنشاء المحادثة: ' + (data.error || 'خطأ غير معروف'));
                }
            } catch (e) { alert('❌ خطأ في الاتصال: ' + e.message); }
        }

        function startPatientPolling() {
            if (patientPolling) clearInterval(patientPolling);
            fetchPatientMessages();
            patientPolling = setInterval(fetchPatientMessages, 3000);
        }

        async function fetchPatientMessages() {
            if (!currentRoomId) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms/${currentRoomId}`);
                const data = await res.json();
                if (data.success && data.room) {
                    const messages = data.room.messages || [];
                    const currentCount = patientMessagesDiv.querySelectorAll('.message').length;
                    if (messages.length > currentCount) {
                        const newMsgs = messages.slice(currentCount);
                        newMsgs.forEach(msg => {
                            const alignment = msg.alignment || (msg.sender_type === 'patient' ? 'left' : 'right');
                            addPatientMessage(msg.sender_type, msg.message, alignment, msg.id);
                        });
                    }
                    if (data.room.patient_name && data.room.patient_name !== patientName) {
                        patientName = data.room.patient_name;
                        patientNameDisplay.textContent = patientName;
                    }
                }
            } catch (e) { console.error('Polling error:', e); }
        }

        async function sendPatientMessage() {
            const msg = patientMsgInput.value.trim();
            if (!msg || !currentRoomId) return;
            try {
                await fetch(`${API_BASE}/api/chat/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: currentRoomId, senderType: 'patient', message: msg })
                });
                // عرض مؤقت للرسالة
                addPatientMessage('patient', msg, 'left');
                patientMsgInput.value = '';
                await fetchPatientMessages();
            } catch (e) { alert('❌ فشل إرسال الرسالة: ' + e.message); }
        }

        // ============================================================
        // 📌 DOCTOR SIDE
        // ============================================================
        let doctorCurrentRoomId = '';
        let doctorPolling = null;

        const roomsList = document.getElementById('roomsList');
        const doctorMessagesDiv = document.getElementById('doctorMessages');
        const doctorMsgInput = document.getElementById('doctorMsgInput');
        const doctorSendBtn = document.getElementById('doctorSendBtn');
        const doctorRoomName = document.getElementById('doctorRoomName');

        // ============================================================
        // 📌 DELETE MESSAGE (للدكتور)
        // ============================================================
        async function deleteMessage(messageId) {
            if (!confirm('هل أنت متأكد من حذف هذه الرسالة؟')) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/messages/${messageId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.success) {
                    showToast('✅ تم حذف الرسالة بنجاح');
                    // حذف من الواجهة
                    document.querySelectorAll(`.message[data-msg-id="${messageId}"]`).forEach(el => el.remove());
                    // تحديث العداد
                    patientMsgCount = patientMessagesDiv.querySelectorAll('.message').length;
                    patientMsgCountEl.textContent = `${patientMsgCount} رسائل`;
                    // تحديث للمريض والدكتور
                    if (doctorCurrentRoomId) fetchDoctorMessages();
                } else {
                    alert('❌ فشل حذف الرسالة: ' + (data.error || 'خطأ غير معروف'));
                }
            } catch (e) { alert('❌ خطأ في الاتصال: ' + e.message); }
        }

        // ============================================================
        // 📌 DELETE ROOM (للدكتور)
        // ============================================================
        async function deleteRoom(roomId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذه المحادثة بالكامل؟')) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms/${roomId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.success) {
                    showToast('✅ تم حذف المحادثة بنجاح');
                    if (doctorCurrentRoomId === roomId) {
                        doctorCurrentRoomId = '';
                        doctorMessagesDiv.innerHTML = '<div class="no-room-selected">👈 اختر محادثة من القائمة لعرض الرسائل</div>';
                        doctorRoomName.textContent = 'اختر محادثة من القائمة';
                        doctorMsgInput.disabled = true;
                        doctorSendBtn.disabled = true;
                    }
                    refreshRooms();
                } else {
                    alert('❌ فشل حذف المحادثة: ' + (data.error || 'خطأ غير معروف'));
                }
            } catch (e) { alert('❌ خطأ في الاتصال: ' + e.message); }
        }

        // ============================================================
        // 📌 DOCTOR UI
        // ============================================================
        async function refreshRooms() {
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms`);
                const data = await res.json();
                if (!data.success || !data.rooms || data.rooms.length === 0) {
                    roomsList.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">لا توجد محادثات</div>';
                    return;
                }
                roomsList.innerHTML = '';
                data.rooms.forEach(room => {
                    const div = document.createElement('div');
                    div.className = 'room-item' + (room.id === doctorCurrentRoomId ? ' active' : '');
                    const unread = room.unread_count > 0 ? `<span class="unread">${room.unread_count}</span>` : '';
                    const guest = room.patient_name === 'Guest' ? '<span class="guest"> 🟡 ضيف</span>' : '';
                    div.innerHTML = `
                        <div class="name">${room.patient_name || 'Guest'} ${guest} ${unread}</div>
                        <div class="phone">📱 ${room.patient_phone || 'غير معروف'}</div>
                        <div class="last-msg">${room.last_message ? room.last_message.message : 'لا توجد رسائل'}</div>
                        <div class="time">${new Date(room.updated_at).toLocaleString()}</div>
                        <button class="delete-room-btn" onclick="event.stopPropagation(); deleteRoom('${room.id}')">✕</button>
                    `;
                    div.onclick = () => selectDoctorRoom(room.id);
                    roomsList.appendChild(div);
                });
            } catch (e) {
                roomsList.innerHTML = '<div style="color:#dc3545;text-align:center;padding:20px;">❌ خطأ في التحميل</div>';
            }
        }

        function selectDoctorRoom(roomId) {
            if (doctorPolling) clearInterval(doctorPolling);
            doctorCurrentRoomId = roomId;
            doctorRoomName.textContent = `الغرفة: ${roomId}`;
            doctorMessagesDiv.innerHTML = '';
            doctorMsgInput.disabled = false;
            doctorSendBtn.disabled = false;
            fetchDoctorMessages();
            doctorPolling = setInterval(fetchDoctorMessages, 3000);
            refreshRooms();
        }

        async function fetchDoctorMessages() {
            if (!doctorCurrentRoomId) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms/${doctorCurrentRoomId}`);
                const data = await res.json();
                if (data.success && data.room) {
                    const msgs = data.room.messages || [];
                    doctorMessagesDiv.innerHTML = '';
                    msgs.forEach(m => {
                        const div = document.createElement('div');
                        const cls = m.alignment === 'left' ? 'message-left' : m.alignment === 'right' ? 'message-right' :
                            'message-system';
                        div.className = `message ${cls}`;
                        div.dataset.msgId = m.id || '';
                        const sender = m.sender_type === 'patient' ? '🧑‍⚕️ مريض' :
                            m.sender_type === 'system' ? '🤖 النظام' : '👨‍⚕️ دكتور';
                        div.innerHTML = `
                            <div class="sender">${sender}</div>
                            <div>${m.message}</div>
                            <div class="time">${new Date(m.created_at).toLocaleTimeString()}</div>
                            ${m.id ? `<button class="delete-btn" onclick="deleteMessage('${m.id}')">✕</button>` : ''}
                        `;
                        doctorMessagesDiv.appendChild(div);
                    });
                    doctorMessagesDiv.scrollTop = doctorMessagesDiv.scrollHeight;
                    refreshRooms();
                }
            } catch (e) { console.error('Doctor polling error:', e); }
        }

        async function sendDoctorMessage() {
            const msg = doctorMsgInput.value.trim();
            if (!msg || !doctorCurrentRoomId) return;
            try {
                await fetch(`${API_BASE}/api/chat/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: doctorCurrentRoomId, senderType: 'doctor', message: msg })
                });
                doctorMsgInput.value = '';
                await fetchDoctorMessages();
                await refreshRooms();
            } catch (e) { alert('❌ فشل إرسال الرسالة: ' + e.message); }
        }

        // ============================================================
        // 📌 TABS
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'doctor') refreshRooms();
        }

        // ============================================================
        // 📌 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            setPatientStatus(false);
            showPatientInput(false);
            patientMsgCountEl.textContent = '0 رسائل';
            refreshRooms();
            setInterval(refreshRooms, 10000);
        });
    </script>
</body>

</html>
