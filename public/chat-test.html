 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 تجربة الشات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        .chat-header {
            background: #2c6b9e;
            color: white;
            padding: 18px 24px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header .status {
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            background: #fafbfc;
            border-bottom: 1px solid #eee;
        }
        .message {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            font-size: 15px;
            line-height: 1.5;
        }
        .message-left {
            background: #cce5ff;
            margin-right: auto;
            border-bottom-right-radius: 4px;
            text-align: right;
        }
        .message-right {
            background: #d4edda;
            margin-left: auto;
            border-bottom-left-radius: 4px;
            text-align: right;
        }
        .message-system {
            background: #e8f5e9;
            margin-left: auto;
            border-bottom-left-radius: 4px;
            text-align: right;
            font-style: italic;
            color: #2e7d32;
        }
        .message .sender {
            font-size: 11px;
            font-weight: bold;
            opacity: 0.7;
            margin-bottom: 3px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
        }
        .chat-input {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
            background: white;
        }
        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e4e8;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .chat-input input:focus {
            border-color: #2c6b9e;
        }
        .chat-input button {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            background: #2c6b9e;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .chat-input button:hover {
            background: #1a4f7a;
        }
        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .room-info {
            padding: 12px 16px;
            background: #e8edf3;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .room-info .room-id {
            font-weight: bold;
            color: #2c6b9e;
            font-size: 12px;
        }
        .typing-indicator {
            font-size: 13px;
            color: #888;
            padding: 4px 16px;
            min-height: 24px;
            font-style: italic;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-container {
            padding: 20px;
            background: #f8f9fc;
            border-bottom: 1px solid #eee;
        }
        .form-container input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 2px solid #e0e4e8;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }
        .form-container input:focus {
            border-color: #2c6b9e;
        }
        .form-container button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #28a745;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .form-container button:hover {
            background: #1e7e34;
        }
        .hidden {
            display: none !important;
        }
        .chat-footer {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            background: #f8f9fc;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="chat-container" id="app">
    <!-- Header -->
    <div class="chat-header">
        <span>💬 الشات</span>
        <span class="status" id="status">⏳ جاري الاتصال...</span>
    </div>

    <!-- Form (اسم ورقم) -->
    <div class="form-container" id="formContainer">
        <input type="text" id="patientName" placeholder="👤 الاسم الكامل" value="يوسف">
        <input type="text" id="patientPhone" placeholder="📱 رقم التليفون" value="01011150572">
        <button onclick="createRoom()">🚀 بدء المحادثة</button>
    </div>

    <!-- Room Info -->
    <div class="room-info hidden" id="roomInfo">
        <span>📌 الغرفة: <span class="room-id" id="roomIdDisplay">-</span></span>
        <span>👤 <span id="patientNameDisplay">-</span></span>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages">
        <div style="text-align:center;color:#999;padding:40px 0;font-size:14px;">
            📌 أدخل اسمك ورقمك ثم اضغط "بدء المحادثة"
        </div>
    </div>

    <!-- Typing -->
    <div class="typing-indicator" id="typingIndicator"></div>

    <!-- Input -->
    <div class="chat-input hidden" id="chatInput">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">📤 إرسال</button>
    </div>

    <!-- Footer -->
    <div class="chat-footer">
        <span id="connectionStatus">🔴 غير متصل</span>
        <span id="messageCount">0 رسائل</span>
    </div>
</div>

<script>
    // ============================================================
    // 🔧 الإعدادات
    // ============================================================
    const API_BASE = 'https://devcore-fawn.vercel.app';
    const DOCTOR_ID = '5b075375-0b21-4e67-91c8-1ab2c709fa85';

    // ============================================================
    // 📌 المتغيرات
    // ============================================================
    let currentRoomId = '';
    let patientName = '';
    let patientPhone = '';
    let pollingInterval = null;
    let lastMessageCount = 0;

    // ============================================================
    // 📌 عناصر DOM
    // ============================================================
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const roomIdDisplay = document.getElementById('roomIdDisplay');
    const patientNameDisplay = document.getElementById('patientNameDisplay');
    const roomInfo = document.getElementById('roomInfo');
    const chatInput = document.getElementById('chatInput');
    const formContainer = document.getElementById('formContainer');
    const connectionStatus = document.getElementById('connectionStatus');
    const messageCount = document.getElementById('messageCount');
    const typingIndicator = document.getElementById('typingIndicator');

    // ============================================================
    // 📌 دوال مساعدة
    // ============================================================
    function addMessage(senderType, message, alignment) {
        const div = document.createElement('div');
        
        // تحديد الكلاس حسب alignment
        if (alignment === 'left') {
            div.className = 'message message-left';
        } else if (alignment === 'right') {
            div.className = 'message message-right';
        } else {
            div.className = 'message message-system';
        }

        // اسم المرسل
        const senderName = senderType === 'patient' ? '🧑‍⚕️ مريض' : 
                          senderType === 'system' ? '🤖 النظام' : '👨‍⚕️ دكتور';
        div.innerHTML = `
            <div class="sender">${senderName}</div>
            <div>${message}</div>
            <div class="time">${new Date().toLocaleTimeString()}</div>
        `;
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        lastMessageCount++;
        messageCount.textContent = `${lastMessageCount} رسائل`;
    }

    function setStatus(connected) {
        statusEl.textContent = connected ? '✅ متصل' : '❌ غير متصل';
        connectionStatus.textContent = connected ? '🟢 متصل' : '🔴 غير متصل';
        sendBtn.disabled = !connected || !currentRoomId;
    }

    function showRoomInfo(roomId, name) {
        roomInfo.classList.remove('hidden');
        roomIdDisplay.textContent = roomId;
        patientNameDisplay.textContent = name;
    }

    function showChatInput(show) {
        if (show) {
            chatInput.classList.remove('hidden');
            sendBtn.disabled = false;
        } else {
            chatInput.classList.add('hidden');
            sendBtn.disabled = true;
        }
    }

    // ============================================================
    // 📌 إنشاء المحادثة
    // ============================================================
    async function createRoom() {
        const name = document.getElementById('patientName').value.trim();
        const phone = document.getElementById('patientPhone').value.trim();

        if (!name || !phone) {
            alert('⚠️ يرجى إدخال الاسم ورقم التليفون');
            return;
        }

        patientName = name;
        patientPhone = phone;

        try {
            const res = await fetch(`${API_BASE}/api/chat/rooms`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    doctor_id: DOCTOR_ID,
                    patient_name: name,
                    patient_phone: phone
                })
            });

            const data = await res.json();

            if (data.success) {
                currentRoomId = data.room.id;
                formContainer.classList.add('hidden');
                showRoomInfo(currentRoomId, patientName);
                showChatInput(true);
                setStatus(true);

                // عرض الرسالة الترحيبية (من الـ Response)
                if (data.autoMessage) {
                    addMessage('system', data.autoMessage, 'right');
                }

                // بدء الـ Polling
                startPolling();

                // تحديث العداد
                messageCount.textContent = '0 رسائل';
            } else {
                alert('❌ فشل إنشاء المحادثة: ' + (data.error || 'خطأ غير معروف'));
            }
        } catch (e) {
            alert('❌ خطأ في الاتصال: ' + e.message);
        }
    }

    // ============================================================
    // 📌 Polling (جلب الرسائل)
    // ============================================================
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        fetchMessages();
        pollingInterval = setInterval(fetchMessages, 3000);
    }

    async function fetchMessages() {
        if (!currentRoomId) return;

        try {
            const res = await fetch(`${API_BASE}/api/chat/rooms/${currentRoomId}`);
            const data = await res.json();

            if (data.success && data.room) {
                const messages = data.room.messages || [];
                
                // عدد الرسائل الحالية في DOM
                const currentCount = messagesDiv.querySelectorAll('.message').length;
                
                if (messages.length > currentCount) {
                    // عرض الرسائل الجديدة فقط
                    const newMessages = messages.slice(currentCount);
                    newMessages.forEach(msg => {
                        const alignment = msg.alignment || (msg.sender_type === 'patient' ? 'left' : 'right');
                        addMessage(msg.sender_type, msg.message, alignment);
                    });
                }

                // تحديث اسم المريض لو اتغير
                if (data.room.patient_name && data.room.patient_name !== patientName) {
                    patientName = data.room.patient_name;
                    patientNameDisplay.textContent = patientName;
                }
            }
        } catch (e) {
            console.error('Polling error:', e);
        }
    }

    // ============================================================
    // 📌 إرسال رسالة
    // ============================================================
    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || !currentRoomId) return;

        try {
            await fetch(`${API_BASE}/api/chat/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    roomId: currentRoomId,
                    senderType: 'patient',
                    message: message
                })
            });

            // عرض الرسالة محلياً
            addMessage('patient', message, 'left');
            messageInput.value = '';

            // جلب الرسائل فوراً
            await fetchMessages();

        } catch (e) {
            alert('❌ فشل إرسال الرسالة: ' + e.message);
        }
    }

    // ============================================================
    // 📌 تحميل أولي
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        setStatus(false);
        showChatInput(false);
        messageCount.textContent = '0 رسائل';
    });
</script>

</body>
</html>
