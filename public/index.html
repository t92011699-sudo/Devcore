 <!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام الشات - العيادة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #e8edf3;
            border-bottom: 2px solid #d0d7e2;
        }

        .tabs button {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tabs button.active {
            background: white;
            border-bottom-color: #2c6b9e;
            color: #2c6b9e;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .patient-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .patient-header {
            background: #2c6b9e;
            color: white;
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .patient-header .status {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 14px;
            border-radius: 20px;
        }

        .patient-messages {
            height: 380px;
            overflow-y: auto;
            background: #fafbfc;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e0e4e8;
            margin-bottom: 12px;
        }

        .msg {
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
            position: relative;
        }

        .msg.doctor {
            background: #d4edda;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .msg.patient {
            background: #cce5ff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg.system {
            background: #fff3cd;
            text-align: center;
            max-width: 100%;
            font-size: 13px;
        }

        .msg .sender {
            font-weight: bold;
            font-size: 12px;
            opacity: 0.7;
            display: block;
            margin-bottom: 2px;
        }

        .msg .time {
            font-size: 10px;
            opacity: 0.5;
            display: block;
            margin-top: 4px;
            text-align: left;
        }

        .patient-input {
            display: flex;
            gap: 10px;
        }

        .patient-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e4e8;
            border-radius: 12px;
            font-size: 15px;
        }

        .patient-input input:focus {
            outline: none;
            border-color: #2c6b9e;
        }

        .patient-input button {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            background: #2c6b9e;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .patient-input button:hover:not(:disabled) {
            background: #1a4f7a;
        }

        .patient-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-hint {
            font-size: 13px;
            color: #888;
            min-height: 24px;
            padding: 4px 0;
        }

        .extracted-box {
            background: #e8f5e9;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #2e7d32;
            margin: 6px 0;
            display: none;
        }

        .extracted-box.show {
            display: block;
        }

        .doctor-dashboard {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .doctor-sidebar {
            flex: 0 0 300px;
            background: #f8f9fc;
            border-radius: 16px;
            padding: 16px;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e4e8;
        }

        .doctor-sidebar h3 {
            margin-bottom: 12px;
            font-size: 16px;
            color: #333;
        }

        .room-item {
            padding: 12px;
            border-radius: 12px;
            background: white;
            margin-bottom: 8px;
            border: 1px solid #e8edf3;
            cursor: pointer;
            transition: 0.2s;
        }

        .room-item:hover {
            border-color: #2c6b9e;
        }

        .room-item.active {
            border-color: #2c6b9e;
            background: #eaf2fa;
        }

        .room-item .name {
            font-weight: bold;
            font-size: 15px;
        }

        .room-item .phone {
            font-size: 13px;
            color: #666;
        }

        .room-item .guest {
            color: #ff8c00;
            font-size: 12px;
        }

        .room-item .unread {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 0 8px;
            font-size: 11px;
            margin-right: 6px;
        }

        .room-item .last-msg {
            font-size: 13px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-item .time {
            font-size: 11px;
            color: #999;
        }

        .doctor-chat-area {
            flex: 1;
            min-width: 300px;
            border: 1px solid #e0e4e8;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 600px;
        }

        .doctor-chat-header {
            background: #2c6b9e;
            color: white;
            padding: 14px 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .doctor-chat-header small {
            font-weight: normal;
            font-size: 14px;
            opacity: 0.8;
        }

        .doctor-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafbfc;
            min-height: 300px;
            max-height: 400px;
        }

        .doctor-input-area {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
            border-top: 1px solid #e0e4e8;
            background: white;
        }

        .doctor-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .doctor-input-area input:focus {
            outline: none;
            border-color: #2c6b9e;
        }

        .doctor-input-area button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #2c6b9e;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .doctor-input-area button:hover:not(:disabled) {
            background: #1a4f7a;
        }

        .doctor-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-room-selected {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .btn-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            min-width: 150px;
        }

        .btn-group button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            white-space: nowrap;
        }

        .btn-group button:hover {
            opacity: 0.85;
        }

        .btn-create {
            background: #28a745;
            color: white;
        }

        .btn-join {
            background: #2c6b9e;
            color: white;
        }

        .btn-leave {
            background: #dc3545;
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .doctor-dashboard {
                flex-direction: column;
            }

            .doctor-sidebar {
                flex: 1;
                max-height: 300px;
            }

            .doctor-chat-area {
                max-height: 500px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group input {
                min-width: unset;
            }

            .patient-input {
                flex-direction: column;
            }

            .patient-input button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="tabs">
            <button class="active" onclick="switchTab('patient')">🧑‍⚕️ شات المريض</button>
            <button onclick="switchTab('doctor')">👨‍⚕️ Dashboard الدكتور</button>
        </div>

        <div id="tab-patient" class="tab-content active">
            <div class="patient-container">
                <div class="patient-header">
                    <span>🏥 عيادة الدكتور أحمد</span>
                    <span class="status" id="patientStatus">⏳ جاري الاتصال...</span>
                </div>

                <div class="btn-group">
                    <input type="text" id="patientRoomId" placeholder="معرف الغرفة (اتركه فارغاً لإنشاء جديدة)">
                    <button class="btn-create" onclick="createNewRoom()">➕ إنشاء محادثة</button>
                    <button class="btn-join" onclick="joinPatientRoom()">🚪 انضمام</button>
                    <button class="btn-leave" onclick="leavePatientRoom()">🚪 مغادرة</button>
                </div>

                <div id="patientRoomInfo" style="font-size:14px; color:#666; margin-bottom:8px;">📌 لا توجد غرفة نشطة
                </div>

                <div class="patient-messages" id="patientMessages">
                    <div class="msg system">📌 أنشئ محادثة جديدة أو انضم لغرفة موجودة</div>
                </div>

                <div class="typing-hint" id="patientTyping"></div>

                <div class="extracted-box" id="patientExtracted">
                    ✅ تم استخراج: <span id="extractedName"></span> - <span id="extractedPhone"></span>
                </div>

                <div class="patient-input">
                    <input type="text" id="patientMsgInput" placeholder="اكتب رسالتك..."
                        onkeypress="if(event.key==='Enter') sendPatientMessage()">
                    <button id="patientSendBtn" onclick="sendPatientMessage()" disabled>📤 إرسال</button>
                </div>
            </div>
        </div>

        <div id="tab-doctor" class="tab-content">
            <div class="doctor-dashboard">
                <div class="doctor-sidebar">
                    <h3>📋 قائمة المحادثات</h3>
                    <div id="roomsList">
                        <div style="color:#999; text-align:center; padding:20px;">جاري تحميل المحادثات...</div>
                    </div>
                    <button onclick="refreshRooms()"
                        style="width:100%; padding:10px; margin-top:10px; background:#2c6b9e; color:white; border:none; border-radius:10px; cursor:pointer; transition:0.3s;">
                        🔄 تحديث
                    </button>
                </div>

                <div class="doctor-chat-area">
                    <div class="doctor-chat-header" id="doctorChatHeader">
                        💬 المحادثة <small id="doctorRoomName">اختر محادثة من القائمة</small>
                    </div>
                    <div class="doctor-messages" id="doctorMessages">
                        <div class="no-room-selected">👈 اختر محادثة من القائمة لعرض الرسائل</div>
                    </div>
                    <div class="doctor-input-area">
                        <input type="text" id="doctorMsgInput" placeholder="اكتب ردك..."
                            onkeypress="if(event.key==='Enter') sendDoctorMessage()" disabled>
                        <button id="doctorSendBtn" onclick="sendDoctorMessage()" disabled>📤 إرسال</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔧 الإعدادات
        // ============================================================
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:5000'
            : 'https://devcore-fawn.vercel.app';

        const DOCTOR_ID = '5b075375-0b21-4e67-91c8-1ab2c709fa85';

        // ============================================================
        // 📌 المتغيرات العامة
        // ============================================================
        let patientRoomId = '';
        let patientName = 'Guest';
        let patientPhone = '01001234567';
        let patientPollingInterval = null;
        let patientLastMessageId = null;
        let patientIsFirstFetch = true;

        let doctorCurrentRoomId = '';
        let doctorPollingInterval = null;

        // ============================================================
        // 📌 التبويبات
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'doctor') refreshRooms();
        }

        // ============================================================
        // 📌 PATIENT SIDE
        // ============================================================
        function addPatientMessage(type, text, sender = '', time = null) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            const timeStr = time ? new Date(time).toLocaleTimeString('ar-EG') : new Date().toLocaleTimeString('ar-EG');
            if (sender) {
                div.innerHTML = `
                    <span class="sender">${sender}</span>
                    ${text}
                    <span class="time">${timeStr}</span>
                `;
            } else {
                div.textContent = text;
            }
            document.getElementById('patientMessages').appendChild(div);
            document.getElementById('patientMessages').scrollTop = document.getElementById('patientMessages').scrollHeight;
        }

        function setPatientStatus(connected) {
            document.getElementById('patientStatus').textContent = connected ? '✅ متصل' : '❌ غير متصل';
            document.getElementById('patientSendBtn').disabled = !connected || !patientRoomId;
        }

        function updatePatientRoomInfo() {
            const info = document.getElementById('patientRoomInfo');
            if (patientRoomId) {
                info.textContent = `📌 الغرفة: ${patientRoomId} | 👤 ${patientName} | 📱 ${patientPhone}`;
            } else {
                info.textContent = '📌 لا توجد غرفة نشطة';
            }
        }

        function setPatientNameAndPhone(name, phone) {
            if (name) patientName = name;
            if (phone) patientPhone = phone;
            updatePatientRoomInfo();
        }

        // ===== إنشاء محادثة =====
        async function createNewRoom() {
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        doctor_id: DOCTOR_ID,
                        patient_name: patientName,
                        patient_phone: patientPhone
                    })
                });
                const data = await res.json();
                if (data.success) {
                    patientRoomId = data.room.id;
                    patientLastMessageId = null;
                    patientIsFirstFetch = true;
                    document.getElementById('patientRoomId').value = patientRoomId;
                    updatePatientRoomInfo();
                    document.getElementById('patientMessages').innerHTML = '';
                    addPatientMessage('system', `✅ تم إنشاء المحادثة بنجاح! معرف الغرفة: ${patientRoomId}`);
                    if (data.autoMessage) {
                        addPatientMessage('doctor', data.autoMessage.message, '👨‍⚕️ دكتور', data.autoMessage.created_at);
                    }
                    setPatientStatus(true);
                    startPatientPolling();
                } else {
                    alert('❌ فشل إنشاء المحادثة: ' + (data.error || 'خطأ غير معروف'));
                }
            } catch (e) {
                alert('❌ خطأ في الاتصال: ' + e.message);
            }
        }

        // ===== الانضمام لغرفة =====
        function joinPatientRoom() {
            const roomId = document.getElementById('patientRoomId').value.trim();
            if (!roomId) {
                alert('⚠️ يرجى إدخال معرف الغرفة أو إنشاء محادثة جديدة');
                return;
            }
            patientRoomId = roomId;
            patientLastMessageId = null;
            patientIsFirstFetch = true;
            updatePatientRoomInfo();
            setPatientStatus(true);
            document.getElementById('patientMessages').innerHTML = '';
            addPatientMessage('system', `📌 تم الانضمام إلى الغرفة: ${patientRoomId}`);
            startPatientPolling();
        }

        // ===== مغادرة الغرفة =====
        function leavePatientRoom() {
            if (patientPollingInterval) {
                clearInterval(patientPollingInterval);
                patientPollingInterval = null;
            }
            patientRoomId = '';
            patientLastMessageId = null;
            patientIsFirstFetch = true;
            document.getElementById('patientRoomId').value = '';
            updatePatientRoomInfo();
            setPatientStatus(false);
            document.getElementById('patientMessages').innerHTML = '<div class="msg system">📌 تم مغادرة الغرفة</div>';
        }

        // ===== بدء Polling =====
        async function startPatientPolling() {
            if (patientPollingInterval) clearInterval(patientPollingInterval);
            await fetchPatientMessages();
            patientPollingInterval = setInterval(fetchPatientMessages, 3000);
        }

        // ===== جلب الرسائل =====
        async function fetchPatientMessages() {
            if (!patientRoomId) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms/${patientRoomId}`);
                const data = await res.json();
                if (data.success && data.room) {
                    const msgs = data.room.messages || [];

                    if (patientLastMessageId) {
                        const newMsgs = msgs.filter(m => m.id > patientLastMessageId);
                        newMsgs.forEach(m => {
                            const sender = m.sender_type === 'doctor' ? '👨‍⚕️ دكتور' : '🧑‍⚕️ مريض';
                            addPatientMessage(m.sender_type, m.message, sender, m.created_at);
                            if (m.sender_type === 'patient') {
                                extractPatientInfo(m.message);
                            }
                        });
                        if (newMsgs.length > 0) {
                            patientLastMessageId = msgs[msgs.length - 1].id;
                        }
                    } else if (patientIsFirstFetch) {
                        msgs.forEach(m => {
                            const sender = m.sender_type === 'doctor' ? '👨‍⚕️ دكتور' : '🧑‍⚕️ مريض';
                            addPatientMessage(m.sender_type, m.message, sender, m.created_at);
                            if (m.sender_type === 'patient') {
                                extractPatientInfo(m.message);
                            }
                        });
                        if (msgs.length > 0) {
                            patientLastMessageId = msgs[msgs.length - 1].id;
                        }
                        patientIsFirstFetch = false;
                    }
                }
            } catch (e) {
                console.error('Polling error:', e);
            }
        }

        // ===== استخراج الاسم والرقم =====
        function extractPatientInfo(message) {
            const cleanMessage = message.trim();
            const phoneMatch = cleanMessage.match(/(01[0125]\d{8})/);
            const nameMatch = cleanMessage.match(/(?:اسمي|الاسم|أنا|اسم)\s*[:]?\s*([^\d]+?)(?:\s*رقم|\s*تلفون|\s*موبايل|$)/i);

            let extractedName = null;
            let extractedPhone = null;

            if (nameMatch && nameMatch[1]) {
                extractedName = nameMatch[1]
                    .replace(/\d/g, '')
                    .replace(/رقم\s*:/i, '')
                    .replace(/تلفون\s*:/i, '')
                    .trim();
            }
            if (phoneMatch && phoneMatch[1]) {
                extractedPhone = phoneMatch[1].trim();
            }

            if (extractedName || extractedPhone) {
                const box = document.getElementById('patientExtracted');
                box.classList.add('show');
                if (extractedName) {
                    document.getElementById('extractedName').textContent = extractedName;
                    setPatientNameAndPhone(extractedName, null);
                }
                if (extractedPhone) {
                    document.getElementById('extractedPhone').textContent = extractedPhone;
                    setPatientNameAndPhone(null, extractedPhone);
                }
                setTimeout(() => box.classList.remove('show'), 5000);
            }
        }

        // ===== إرسال رسالة (محسن - مع إصلاح UUID) =====
        async function sendPatientMessage() {
            const input = document.getElementById('patientMsgInput');
            const msg = input.value.trim();
            if (!msg) return;
            if (!patientRoomId) {
                alert('⚠️ يرجى الانضمام إلى غرفة أولاً');
                return;
            }

            const sendBtn = document.getElementById('patientSendBtn');
            sendBtn.disabled = true;

            try {
                // ✅ إصلاح: إرسال senderId كـ null - السيرفر سيستخدم patient_id من الغرفة
                const response = await fetch(`${API_BASE}/api/chat/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        roomId: patientRoomId,
                        senderType: 'patient',
                        senderId: null,
                        message: msg,
                        messageType: 'text',
                        fileUrl: null
                    })
                });
                const data = await response.json();

                if (data.success) {
                    addPatientMessage('patient', msg, '👤 أنت');
                    if (data.data && data.data.id) {
                        patientLastMessageId = data.data.id;
                    }
                    input.value = '';
                    await fetchPatientMessages();
                } else {
                    alert('❌ فشل إرسال الرسالة: ' + (data.error || 'خطأ غير معروف'));
                }
            } catch (e) {
                alert('❌ فشل إرسال الرسالة: ' + e.message);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ============================================================
        // 📌 DOCTOR DASHBOARD
        // ============================================================
        async function refreshRooms() {
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms?doctor_id=${DOCTOR_ID}`);
                const data = await res.json();
                const container = document.getElementById('roomsList');
                if (!data.success || !data.rooms || data.rooms.length === 0) {
                    container.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">لا توجد محادثات</div>';
                    return;
                }
                container.innerHTML = '';
                data.rooms.forEach(room => {
                    const div = document.createElement('div');
                    div.className = 'room-item' + (room.id === doctorCurrentRoomId ? ' active' : '');
                    const unread = room.unread_count > 0 ? `<span class="unread">${room.unread_count}</span>` : '';
                    const guest = room.patient_name === 'Guest' ? '<span class="guest"> 🟡 ضيف</span>' : '';
                    div.innerHTML = `
                        <div class="name">${room.patient_name || 'Guest'} ${guest} ${unread}</div>
                        <div class="phone">📱 ${room.patient_phone || 'غير معروف'}</div>
                        <div class="last-msg">${room.last_message ? room.last_message.message : 'لا توجد رسائل'}</div>
                        <div class="time">${new Date(room.updated_at).toLocaleString('ar-EG')}</div>
                    `;
                    div.onclick = () => selectRoom(room.id);
                    container.appendChild(div);
                });
            } catch (e) {
                document.getElementById('roomsList').innerHTML = '<div style="color:#dc3545; text-align:center; padding:20px;">❌ خطأ في التحميل</div>';
            }
        }

        function selectRoom(roomId) {
            if (doctorPollingInterval) {
                clearInterval(doctorPollingInterval);
                doctorPollingInterval = null;
            }
            doctorCurrentRoomId = roomId;
            document.getElementById('doctorRoomName').textContent = `الغرفة: ${roomId}`;
            document.getElementById('doctorMessages').innerHTML = '';
            document.getElementById('doctorMsgInput').disabled = false;
            document.getElementById('doctorSendBtn').disabled = false;

            fetchDoctorMessages();
            doctorPollingInterval = setInterval(fetchDoctorMessages, 3000);
        }

        async function fetchDoctorMessages() {
            if (!doctorCurrentRoomId) return;
            try {
                const res = await fetch(`${API_BASE}/api/chat/rooms/${doctorCurrentRoomId}`);
                const data = await res.json();
                if (data.success && data.room) {
                    const msgs = data.room.messages || [];
                    const container = document.getElementById('doctorMessages');
                    container.innerHTML = '';
                    msgs.forEach(m => {
                        const div = document.createElement('div');
                        div.className = `msg ${m.sender_type}`;
                        const sender = m.sender_type === 'doctor' ? '👨‍⚕️ دكتور' : '🧑‍⚕️ مريض';
                        const time = new Date(m.created_at).toLocaleTimeString('ar-EG');
                        div.innerHTML = `
                            <span class="sender">${sender}</span>
                            ${m.message}
                            <span class="time">${time}</span>
                        `;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                    refreshRooms();
                }
            } catch (e) {
                console.error('Doctor polling error:', e);
            }
        }

        // ===== إرسال رسالة الدكتور (محسن - مع إصلاح UUID) =====
        async function sendDoctorMessage() {
            const input = document.getElementById('doctorMsgInput');
            const msg = input.value.trim();
            if (!msg || !doctorCurrentRoomId) return;

            const sendBtn = document.getElementById('doctorSendBtn');
            sendBtn.disabled = true;

            try {
                // ✅ إصلاح: إرسال senderId كـ null - السيرفر سيستخدم doctor_id من الغرفة
                await fetch(`${API_BASE}/api/chat/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        roomId: doctorCurrentRoomId,
                        senderType: 'doctor',
                        senderId: null,
                        message: msg,
                        messageType: 'text',
                        fileUrl: null
                    })
                });
                input.value = '';
                await fetchDoctorMessages();
                await refreshRooms();
            } catch (e) {
                alert('❌ فشل إرسال الرسالة: ' + e.message);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ============================================================
        // 📌 تحميل أولي
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            refreshRooms();
            setInterval(refreshRooms, 10000);
        });

        console.log('🚀 Chat App Loaded');
        console.log(`📡 API Base: ${API_BASE}`);
        console.log(`👨‍⚕️ Doctor ID: ${DOCTOR_ID}`);
    </script>

</body>

</html>
